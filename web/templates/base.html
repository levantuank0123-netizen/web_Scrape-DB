<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Affiliate Scraper{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0b0d12; }
    .card-glow:hover { box-shadow: 0 0 40px rgba(99,102,241,0.3); transform: translateY(-2px); }
    .card-glow { transition: all 0.2s ease; }
    .text-muted { color: #94a3b8; }
    table.data-table { width: 100%; border-collapse: collapse; }
    table.data-table th, table.data-table td { padding: 8px 12px; border-bottom: 1px solid #1f2937; text-align: left; font-size: 13px; }
    table.data-table th { background: #111827; color: #cbd5e1; font-weight: 600; }
    table.data-table tr:hover { background: #111827; }
    .due-now { background: #ff6666; color: white; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
    .err { background: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{{ url_for('index') }}" class="flex items-center gap-3">
        <div class="text-2xl">📊</div>
        <div>
          <div class="text-lg font-bold">Affiliate Dashboard Scraper</div>
          <div class="text-xs text-muted">Multi-platform metrics aggregator</div>
        </div>
      </a>
      <div class="flex items-center gap-3">
        {% block header_actions %}{% endblock %}
        <select id="date-picker" onchange="changeDate(this.value)" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm">
          {% for d in dates_available %}
            <option value="{{ d }}" {% if d == metric_date %}selected{% endif %}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-xs text-muted py-6">
    Made by KhoiTeam · Cron 7h sáng mỗi ngày · <a href="https://docs.google.com/spreadsheets/d/1FN-S396L4Eci3kGM12S70ltk53JtDvk3HzbXKzmocm4/edit" class="text-blue-400 hover:underline" target="_blank">Open Sheet</a>
  </footer>

  <script>
    function changeDate(d) {
      const url = new URL(window.location);
      url.searchParams.set('date', d);
      window.location = url.toString();
    }
    function triggerScrape(platform) {
      if (!confirm(`Chạy lại scrape ${platform}? Mất ~2-5 phút.`)) return;
      fetch(`/scrape/${platform}`, {method:'POST'})
        .then(r => r.json())
        .then(d => alert(`Đã trigger scrape ${platform}. Refresh sau vài phút để xem.`));
    }
  </script>
</body>
</html>
